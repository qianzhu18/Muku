services:
  ytdl-webui:
    build: .
    restart: unless-stopped
    ports:
      - "${MUKU_BIND_HOST:-0.0.0.0}:${MUKU_WEB_PORT:-5657}:5657"
    volumes:
      - "${DOCKER_DOWNLOADS_DIR:-./docker-data/downloads}:/downloads"
      - "${DOCKER_CONFIG_DIR:-./docker-data/config}:/config"
      - "./cookies:/cookies:ro"
    environment:
      HOST: 0.0.0.0
      PORT: 5657
      MUKU_WEB_TOKEN: ${MUKU_WEB_TOKEN:-}
      MUKU_RESUME_JOBS: ${MUKU_RESUME_JOBS:-true}
      MAX_START_URLS: ${MAX_START_URLS:-50}
      DOWNLOAD_DIR: /downloads
      DOWNLOAD_ROOT_DIR: /downloads
      HOST_DOWNLOADS_DIR: ${DOCKER_DOWNLOADS_DIR:-./docker-data/downloads}
      VIDEO_DOWNLOADE_CONFIG_DIR: /config
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      ENABLE_TRANSCRIPTION: ${ENABLE_TRANSCRIPTION:-true}
      OPENROUTER_TRANSCRIPTION_MODEL: ${OPENROUTER_TRANSCRIPTION_MODEL:-openai/gpt-audio-mini}
      ENABLE_AI_CLEANUP: ${ENABLE_AI_CLEANUP:-true}
      AI_CLEANUP_BASE_URL: ${AI_CLEANUP_BASE_URL:-https://openrouter.ai/api/v1}
      AI_CLEANUP_API_KEY: ${AI_CLEANUP_API_KEY:-}
      AI_CLEANUP_MODEL: ${AI_CLEANUP_MODEL:-stepfun/step-3.7-flash}
      AI_CLEANUP_PROVIDER_LABEL: ${AI_CLEANUP_PROVIDER_LABEL:-openrouter}
      AI_CLEANUP_TIMEOUT_SECONDS: ${AI_CLEANUP_TIMEOUT_SECONDS:-120}
      AI_CLEANUP_MAX_RETRIES: ${AI_CLEANUP_MAX_RETRIES:-2}
      ENABLE_ARTICLE_DRAFT: ${ENABLE_ARTICLE_DRAFT:-true}
      ARTICLE_DRAFT_BASE_URL: ${ARTICLE_DRAFT_BASE_URL:-https://openrouter.ai/api/v1}
      ARTICLE_DRAFT_API_KEY: ${ARTICLE_DRAFT_API_KEY:-}
      ARTICLE_DRAFT_MODEL: ${ARTICLE_DRAFT_MODEL:-stepfun/step-3.7-flash}
      ARTICLE_DRAFT_PROVIDER_LABEL: ${ARTICLE_DRAFT_PROVIDER_LABEL:-openrouter}
      ARTICLE_DRAFT_TIMEOUT_SECONDS: ${ARTICLE_DRAFT_TIMEOUT_SECONDS:-180}
      ARTICLE_DRAFT_MAX_RETRIES: ${ARTICLE_DRAFT_MAX_RETRIES:-2}
      ENABLE_KNOWLEDGE_DRAFT: ${ENABLE_KNOWLEDGE_DRAFT:-true}
      KNOWLEDGE_DRAFT_BASE_URL: ${KNOWLEDGE_DRAFT_BASE_URL:-https://openrouter.ai/api/v1}
      KNOWLEDGE_DRAFT_API_KEY: ${KNOWLEDGE_DRAFT_API_KEY:-}
      KNOWLEDGE_DRAFT_MODEL: ${KNOWLEDGE_DRAFT_MODEL:-stepfun/step-3.7-flash}
      KNOWLEDGE_DRAFT_PROVIDER_LABEL: ${KNOWLEDGE_DRAFT_PROVIDER_LABEL:-openrouter}
      KNOWLEDGE_DRAFT_TIMEOUT_SECONDS: ${KNOWLEDGE_DRAFT_TIMEOUT_SECONDS:-180}
      KNOWLEDGE_DRAFT_MAX_RETRIES: ${KNOWLEDGE_DRAFT_MAX_RETRIES:-2}
      COOKIES_PATH: ${DOCKER_COOKIES_PATH:-}
      YOUTUBE_COOKIES_PATH: ${DOCKER_YOUTUBE_COOKIES_PATH:-}
      BILIBILI_COOKIES_PATH: ${DOCKER_BILIBILI_COOKIES_PATH:-}
      DOUYIN_COOKIES_PATH: ${DOCKER_DOUYIN_COOKIES_PATH:-}
