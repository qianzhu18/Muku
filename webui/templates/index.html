<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fafaf9" />
    <link
      rel="icon"
      href="https://imagehost.qianzhu.online/api/rfile/千逐（卡通版）.jpg"
      type="image/jpeg"
    />
    <title>{{ app_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="brand">
          <img
            src="https://imagehost.qianzhu.online/api/rfile/千逐（卡通版）.jpg"
            class="profile-avatar"
            alt="Qianzhu"
          />
          <h1>Downloader by Qianzhu</h1>
        </div>
        <nav>
          <a href="https://blog.qianzhu.me/" target="_blank" class="nav-link">
            📖 使用教程
          </a>
        </nav>
      </header>

      <section class="card">
        <div class="card-header">
          <h2>新建任务</h2>
          <p>支持 YouTube、Bilibili 等主流平台。现在分成三种明确模式：最高画质视频、MP3 音频、Markdown 逐字稿。</p>
        </div>

        <form id="download-form">
          <div class="field">
            <label for="url">视频链接 (一行一个)</label>
            <textarea
              id="url"
              name="url"
              rows="3"
              placeholder="在此粘贴链接..."
              required
            ></textarea>
          </div>

          <div
            class="field"
            style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;"
          >
            <div>
              <label for="preset">下载格式</label>
              <select id="preset" name="preset"></select>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px; padding-top: 24px;">
              <div style="display: flex; align-items: center;">
                <input type="checkbox" id="use-cookies" style="width: auto; margin-right: 8px;" />
                <label for="use-cookies" style="margin: 0; cursor: pointer;">
                  启用 Cookies (`cookies.txt` / 浏览器登录态)
                </label>
              </div>
            </div>
          </div>

          <p id="mode-hint" style="margin: -6px 0 16px; font-size: 0.84rem; color: var(--text-sub);">
            `Markdown 逐字稿` 模式会先尝试直接提取平台字幕；如果拿不到，再自动回退到 MP3 转写。
          </p>
          <p id="cookies-hint" style="margin: -10px 0 16px; font-size: 0.82rem; color: var(--text-sub);">
            当前未检测到 Cookies 配置。YouTube 和部分 B 站视频可能无法直接提取字幕。
          </p>

          <button type="submit" id="start-btn" class="btn-primary">开始下载</button>
        </form>
      </section>

      <section class="card">
        <div
          class="card-header"
          style="display: flex; justify-content: space-between; align-items: center;"
        >
          <h2>任务队列</h2>
          <span id="queue-count" style="font-size: 0.8rem; color: var(--text-sub);">
            0 active
          </span>
        </div>
        <ul id="task-list" class="task-list">
          <li style="padding: 20px; text-align: center; color: var(--text-light); font-size: 0.9rem;">
            暂无下载任务，去添加一个吧 🍃
          </li>
        </ul>
      </section>

      <footer class="site-footer">
        <p>
          Designed with <span style="color: #e4572e;">&hearts;</span> by
          <a href="https://blog.qianzhu.me/" target="_blank">Qianzhu (千逐)</a>
        </p>
      </footer>
    </main>

    <script>
      window.APP_CONFIG = {{ config_json | safe }};
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
